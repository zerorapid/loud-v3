<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOUD | HYPER-ADMIN V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { --black: #000000; --white: #FFFFFF; --accent: #FF5C00; }
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; }
        .h1 { font-weight: 900; letter-spacing: -0.05em; text-transform: uppercase; }
        .card { background: #111; border-radius: 24px; border: 1px solid #222; transition: all 0.3s; }
        .card:hover { border-color: #444; background: #161616; }
        .input-field { background: #1a1a1a; border: 1px solid #333; color: white; padding: 14px; border-radius: 12px; width: 100%; font-weight: 600; transition: all 0.2s; }
        .input-field:focus { border-color: white; outline: none; background: #222; }
        .input-field:invalid { border-color: #ef4444; background: #1f1111; }
        .btn-primary { background: white; color: black; font-weight: 900; padding: 16px; border-radius: 12px; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; cursor: pointer; }
        .btn-primary:active { scale: 0.95; }
        .sidebar-link { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; color: #888; font-weight: 700; font-size: 13px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
        .sidebar-link.active { background: white; color: black; }
        .toast { position: fixed; bottom: 40px; right: 40px; background: white; color: black; padding: 20px 40px; border-radius: 100px; font-weight: 900; box-shadow: 0 20px 40px rgba(0,0,0,0.5); transform: translateY(100px); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; }
        .toast.show { transform: translateY(0); }
        
        /* MOBILE OVERRIDES */
        @media (max-width: 1024px) {
            aside { transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 80% !important; box-shadow: 20px 0 60px rgba(0,0,0,0.8); }
            aside.open { transform: translateX(0); }
            main { margin-left: 0 !important; padding: 1.5rem !important; }
            .h1.text-6xl { font-size: 2.5rem !important; }
            header { flex-direction: column; align-items: flex-start !important; gap: 2rem; }
        }
        .mobile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-blur: 5px; z-index: 40; display: none; }
        .mobile-overlay.show { display: block; }
        
        @keyframes pulse-orange {
            0% { box-shadow: 0 0 0 0 rgba(255, 92, 0, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(255, 92, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 92, 0, 0); }
        }
        .heat-pulse { animation: pulse-orange 2s infinite; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- MOBILE TOGGLE -->
    <button onclick="toggleSidebar()" class="lg:hidden fixed top-6 left-6 z-[60] w-12 h-12 bg-white/10 backdrop-blur-lg rounded-xl flex items-center justify-center border border-white/5">
        <span class="material-symbols-outlined text-white">menu</span>
    </button>
    <div id="mobileOverlay" class="mobile-overlay" onclick="toggleSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="w-72 border-r border-white/5 p-10 flex flex-col fixed h-full bg-black z-50">
        <div class="mb-20">
            <h1 class="h1 italic text-3xl">LOUD<span class="text-orange-500">.</span></h1>
            <p class="text-[9px] font-black uppercase tracking-[0.3em] opacity-30">Admin V2 Hyper-Drive</p>
        </div>

        <nav class="space-y-4 flex-1">
            <div onclick="setView('inventory')" id="nav-inventory" class="sidebar-link active">
                <span class="material-symbols-outlined">inventory</span> Inventory
            </div>
            <div onclick="setView('orders')" id="nav-orders" class="sidebar-link">
                <span class="material-symbols-outlined">notifications_active</span> Live Orders
            </div>
            <div onclick="setView('analytics')" id="nav-analytics" class="sidebar-link">
                <span class="material-symbols-outlined">insights</span> Intelligence
            </div>
            <div onclick="setView('dispatch')" id="nav-dispatch" class="sidebar-link">
                <span class="material-symbols-outlined">directions_bike</span> Dispatcher
            </div>
            <div onclick="setView('gaps')" id="nav-gaps" class="sidebar-link">
                <span class="material-symbols-outlined">search_off</span> Market Gaps
            </div>
        </nav>

        <div class="pt-8 border-t border-white/5">
            <button onclick="location.href='index.html'" class="w-full bg-white/5 text-white/50 py-4 rounded-xl text-[10px] font-black uppercase hover:bg-white hover:text-black transition-all">Exit Dashboard</button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="ml-72 flex-1 p-16">
        
        <header class="flex justify-between items-end mb-16">
            <div>
                <h2 id="viewTitle" class="h1 italic text-6xl">INVENTORY</h2>
                <p id="viewSub" class="text-white/30 font-bold uppercase tracking-widest text-[10px] mt-4">Complete command over your warehouse products</p>
            </div>
            <button onclick="openModal('add')" class="bg-white text-black w-16 h-16 rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-2xl">
                <span class="material-symbols-outlined font-black">add</span>
            </button>
        </header>

        <!-- SEARCH -->
        <div id="controls" class="mb-12">
            <div class="relative max-w-2xl">
                <span class="material-symbols-outlined absolute left-6 top-1/2 -translate-y-1/2 text-white/20">search</span>
                <input type="text" id="adminSearch" oninput="handleSearch()" placeholder="Search products, IDs, or categories..." class="w-full pl-16 pr-8 py-5 bg-white/5 rounded-2xl text-sm font-bold border border-white/5 focus:border-white/20 outline-none transition-all">
            </div>
        </div>

        <div id="contentArea" class="pb-32">
            <!-- Dynamic Content -->
        </div>

    </main>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="toast">Action Successful 🚀</div>

    <!-- GLOBAL MODAL -->
    <div id="globalModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl hidden flex items-center justify-center z-[500] p-6">
        <div class="bg-[#0a0a0a] w-full max-w-2xl rounded-[40px] p-12 border border-white/10 relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-10 right-10 w-12 h-12 bg-white/5 rounded-full flex items-center justify-center hover:bg-white/10">
                <span class="material-symbols-outlined">close</span>
            </button>
            
            <h3 id="modalTitle" class="h1 italic text-4xl mb-12">Add Product</h3>
            
            <form id="productForm" onsubmit="event.preventDefault(); submitProduct();" class="grid grid-cols-2 gap-6 max-h-[60vh] overflow-y-auto no-scrollbar pr-4">
                <div class="col-span-2">
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Product Name</label>
                    <input type="text" id="m-name" class="input-field" placeholder="e.g. Fresh Milk" required minlength="3">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Base Price (₹)</label>
                    <input type="number" id="m-price" class="input-field" placeholder="100" required min="1">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Discount Price (₹)</label>
                    <input type="number" id="m-discount" class="input-field" placeholder="89" required min="0">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Stock Level</label>
                    <input type="number" id="m-stock" class="input-field" placeholder="25" required min="0">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Weight (grams)</label>
                    <input type="number" id="m-weight" class="input-field" placeholder="500" required min="1">
                </div>
                <div class="col-span-2">
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Category</label>
                    <select id="m-category" class="input-field" required>
                        <option value="Dairy">Dairy</option>
                        <option value="Pantry">Pantry</option>
                        <option value="Produce">Produce</option>
                        <option value="Beverages">Beverages</option>
                        <option value="Snacks">Snacks</option>
                        <option value="Household">Household</option>
                    </select>
                </div>
                <div class="pt-6 border-t border-white/5 col-span-2">
                    <p class="text-[9px] font-black uppercase text-orange-500 mb-4 tracking-widest">Arbitrage Sniper 🎯</p>
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Zepto Price (₹)</label>
                    <input type="number" id="m-zepto" class="input-field" placeholder="Price on Zepto">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Blinkit Price (₹)</label>
                    <input type="number" id="m-blinkit" class="input-field" placeholder="Price on Blinkit">
                </div>
                <div class="col-span-2">
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Image URL</label>
                    <input type="url" id="m-img" class="input-field" placeholder="https://cdn..." required>
                </div>
                <div class="col-span-2">
                    <label class="text-[9px] font-black uppercase text-white/30 mb-2 block">Description</label>
                    <textarea id="m-desc" class="input-field h-24 resize-none" placeholder="Product details..." required minlength="10"></textarea>
                </div>
                <div class="mt-12 col-span-2">
                    <button type="submit" id="modalActionBtn" class="w-full btn-primary">Create Product</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SB_URL = "https://asvelariyhlcrnujtqsq.supabase.co";
        const SB_KEY = "sb_publishable_T6-Wlk2PumuS8_xzBRI3ng_KWouOIDi";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let DATA = [];
        let ORDERS = [];
        let SEARCH_LOGS = [];
        let currentView = 'inventory';
        let editingId = null;

        async function fetchData() {
            const { data: p, error: pe } = await _supabase.from('products').select('*').order('id');
            const { data: o, error: oe } = await _supabase.from('orders').select('*').order('created_at', { ascending: false });
            const { data: s, error: se } = await _supabase.from('search_logs').select('*').order('created_at', { ascending: false });
            
            if (pe || oe || se) showToast("Cloud Sync Error 🔴");
            
            // AUDIBLE PULSE: Check for new orders
            if (ORDERS.length > 0 && o && o.length > ORDERS.length) {
                playOrderSound();
                showToast("NEW ORDER RECEIVED! 💰");
            }

            DATA = p || [];
            ORDERS = o || [];
            SEARCH_LOGS = s || [];
            render();
        }

        function playOrderSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // High A
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.1);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function setView(v) {
            currentView = v;
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            const navItem = document.getElementById(`nav-${v}`);
            if (navItem) navItem.classList.add('active');
            document.getElementById('viewTitle').innerText = v.toUpperCase();
            if (window.innerWidth <= 1024) toggleSidebar(); // Auto-close on mobile
            render();
        }

        let searchTimeout;
        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                if (currentView === 'inventory') renderInventory(document.getElementById('contentArea'));
            }, 300);
        }

        function toggleSidebar() {
            document.querySelector('aside').classList.toggle('open');
            document.getElementById('mobileOverlay').classList.toggle('show');
        }

        function render() {
            const area = document.getElementById('contentArea');
            if (currentView === 'inventory') renderInventory(area);
            else if (currentView === 'orders') renderOrders(area);
            else if (currentView === 'analytics') renderAnalytics(area);
            else if (currentView === 'dispatch') renderDispatch(area);
            else if (currentView === 'gaps') renderGaps(area);
            else if (currentView === 'categories') renderCategories(area);
        }

        function renderInventory(el) {
            const q = document.getElementById('adminSearch').value.toLowerCase();
            const filtered = DATA.filter(p => p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
            
            el.innerHTML = `
                <div class="grid grid-cols-1 xl:grid-cols-1 gap-4">
                    ${filtered.map(p => {
                        const targetPrice = Math.min(p.zepto_price || 9999, p.blinkit_price || 9999) - 1;
                        const isWinning = targetPrice > 0 && p.discount_price <= targetPrice;
                        
                        return `
                        <div class="card p-6 lg:p-8 flex flex-col md:flex-row gap-6 md:gap-8 items-start md:items-center relative overflow-hidden mb-8">
                            <div class="w-20 h-20 bg-white/5 rounded-xl flex items-center justify-center p-2 flex-shrink-0">
                                <img src="${p.image_url}" class="w-full h-full object-contain"/>
                            </div>
                            
                            <div class="flex-1 min-w-0">
                                <p class="text-[8px] font-black text-white/20 uppercase tracking-widest mb-1">#${p.id} • ${p.category}</p>
                                <h4 class="h1 italic !text-lg lg:!text-xl mb-3 truncate" title="${p.name}">${p.name}</h4>
                                <div class="flex gap-4 items-center">
                                    <span class="text-xs font-bold ${isWinning ? 'text-green-500' : 'text-orange-500'}">₹${p.discount_price}</span>
                                    <span class="text-[9px] px-3 py-1 rounded-full ${p.stock < 10 ? 'bg-orange-500/10 text-orange-500' : 'bg-green-500/10 text-green-500'} font-black uppercase">Stock: ${p.stock}</span>
                                </div>
                                
                                ${targetPrice < 9000 ? `
                                    <div class="mt-4 pt-4 border-t border-white/5 flex gap-4 items-center">
                                        <div class="flex flex-col">
                                            <span class="text-[8px] font-black text-white/20 uppercase">Target to Beat</span>
                                            <span class="text-[10px] font-bold text-green-400">₹${targetPrice}</span>
                                        </div>
                                        <div class="px-2 py-1 bg-white/5 rounded-md text-[7px] font-black uppercase ${isWinning ? 'text-green-500' : 'text-red-400'}">
                                            ${isWinning ? 'WINNING' : 'OVERPRICED'}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>

                            <div class="flex gap-2 self-end md:self-center">
                                <button onclick="openComparison('${p.name}')" class="w-10 h-10 bg-blue-500/10 text-blue-500 rounded-lg flex items-center justify-center transition-all hover:bg-blue-500 hover:text-white" title="Compare Online">
                                    <span class="material-symbols-outlined text-[18px]">search_insights</span>
                                </button>
                                <button onclick="openModal('edit', ${p.id})" class="w-10 h-10 bg-white/5 hover:bg-white hover:text-black rounded-lg flex items-center justify-center transition-all">
                                    <span class="material-symbols-outlined text-[18px]">edit</span>
                                </button>
                                <button onclick="deleteProduct(${p.id})" class="w-10 h-10 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white rounded-lg flex items-center justify-center transition-all">
                                    <span class="material-symbols-outlined text-[18px]">delete</span>
                                </button>
                            </div>
                        </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderAnalytics(el) {
            const today = new Date().toLocaleDateString();
            const tOrders = ORDERS.filter(o => new Date(o.created_at).toLocaleDateString() === today && o.status !== 'Cancelled');
            
            const revenue = tOrders.reduce((sum, o) => sum + (o.total_amount || 0), 0);
            const profit = tOrders.length * 12; // Platform Fee Model
            const orderCount = tOrders.length;
            
            el.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
                    <div class="card p-12 bg-white text-black transition-all hover:scale-[1.02]">
                        <p class="text-[10px] font-black uppercase tracking-widest mb-4 opacity-40">Today's Revenue</p>
                        <h3 class="h1 italic text-7xl">₹${revenue}</h3>
                        <p class="text-[9px] font-bold mt-8 uppercase text-black/30 tracking-[0.2em]">Gross Cash Entry</p>
                    </div>
                    <div class="card p-12 bg-orange-500 text-black transition-all hover:scale-[1.02] shadow-[0_0_50px_rgba(255,92,0,0.2)]">
                        <p class="text-[10px] font-black uppercase tracking-widest mb-4 opacity-50">Founder Profit</p>
                        <h3 class="h1 italic text-7xl">₹${profit}</h3>
                        <p class="text-[9px] font-bold mt-8 uppercase text-black/40 tracking-[0.2em]">Platform Fees Cleared</p>
                    </div>
                    <div class="card p-12 border-white/20 transition-all hover:scale-[1.02]">
                        <p class="text-[10px] font-black uppercase tracking-widest mb-4 opacity-20">Volume</p>
                        <h3 class="h1 italic text-7xl">${orderCount}</h3>
                        <p class="text-[9px] font-bold mt-8 uppercase text-white/20 tracking-[0.2em]">Daily Deliveries</p>
                    </div>
                </div>

                <div class="card p-12 overflow-hidden relative">
                    <div class="flex justify-between items-end mb-12">
                        <div>
                            <h3 class="h1 italic text-3xl">Revenue Stream</h3>
                            <p class="text-[10px] font-bold text-white/20 uppercase tracking-widest mt-2">Real-time Daily Ledger</p>
                        </div>
                        <span class="text-[9px] font-black px-4 py-2 bg-white/5 rounded-full uppercase tracking-tighter">${today}</span>
                    </div>
                    <div class="space-y-6">
                        ${tOrders.map(o => `
                            <div class="flex justify-between items-center py-6 border-b border-white/5 group hover:bg-white/5 px-4 -mx-4 rounded-xl transition-all">
                                <div>
                                    <p class="text-[10px] font-black uppercase text-white/20 tracking-tighter">ORD-${o.id}</p>
                                    <h5 class="h3 italic !text-base">${o.customer_name}</h5>
                                </div>
                                <div class="text-right">
                                    <p class="h1 italic !text-xl text-green-500">+₹${o.total_amount}</p>
                                    <p class="text-[8px] font-black text-white/30 uppercase">Fee: ₹12</p>
                                </div>
                            </div>
                        `).join('') || '<div class="py-40 text-center"><span class="material-symbols-outlined text-7xl opacity-5 mb-4">payments</span><p class="opacity-10 h1 text-4xl uppercase italic">Waiting for First Sale...</p></div>'}
                    </div>
                </div>
            `;
        }

        function renderDispatch(el) {
            const clusters = {};
            const activeOrders = ORDERS.filter(o => ['Pending', 'Packing', 'Shipped'].includes(o.status));
            
            activeOrders.forEach(o => {
                const area = o.address.street.split(',')[0].trim();
                if (!clusters[area]) clusters[area] = { count: 0, orders: [] };
                clusters[area].count++;
                clusters[area].orders.push(o);
            });

            const sortedAreas = Object.entries(clusters).sort((a,b) => b[1].count - a[1].count);
            const topArea = sortedAreas[0] ? sortedAreas[0][0] : "No Active Orders";

            el.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-16">
                    <div class="lg:col-span-2 card p-12 bg-orange-500/5 border-orange-500/20 relative overflow-hidden">
                        <div class="z-10 relative">
                            <p class="text-[10px] font-black uppercase text-orange-500 tracking-[0.3em] mb-4">Tactical Recommendation</p>
                            <h3 class="h1 italic text-5xl mb-6">BICYCLE HUB: ${topArea}</h3>
                            <p class="text-white/40 text-sm max-w-xl leading-relaxed">Cluster density is highest in this area. Park your bicycle near the central landmark of ${topArea} for sub-3 minute delivery times.</p>
                            <button onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(topArea)}', '_blank')" class="mt-8 bg-orange-500 text-black px-8 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest flex items-center gap-3">
                                <span class="material-symbols-outlined text-sm">navigation</span> Navigate to Hub
                            </button>
                        </div>
                        <div class="absolute -right-20 -bottom-20 opacity-10">
                            <span class="material-symbols-outlined text-[300px]">directions_bike</span>
                        </div>
                    </div>
                    
                    <div class="card p-10 flex flex-col justify-center items-center text-center">
                        <p class="text-[9px] font-black uppercase text-white/30 tracking-[0.2em] mb-4">Total Active Heat</p>
                        <h4 class="h1 italic text-7xl text-orange-500">${activeOrders.length}</h4>
                        <p class="text-[9px] font-bold text-white/20 mt-4 uppercase">Live Delivery Load</p>
                    </div>
                </div>

                <h4 class="h1 italic text-2xl mb-10 pb-6 border-b border-white/5">Area Demand Clusters</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                    ${sortedAreas.map(([area, data]) => `
                        <div class="card p-8 transition-all hover:scale-[1.02] ${data.count >= 3 ? 'heat-pulse border-orange-500/50 bg-orange-500/5' : ''}">
                            <div class="flex justify-between items-start mb-6">
                                <div>
                                    <h5 class="h1 italic !text-2xl">${area}</h5>
                                    <p class="text-[9px] font-black text-white/30 uppercase tracking-widest mt-1">${data.count} Orders Processing</p>
                                </div>
                                <div class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center">
                                    <span class="material-symbols-outlined ${data.count >= 3 ? 'text-orange-500' : 'text-white/20'}">location_on</span>
                                </div>
                            </div>
                            <div class="space-y-4 mb-8">
                                ${data.orders.slice(0, 3).map(o => `
                                    <div class="flex justify-between items-center text-[11px] font-bold">
                                        <span class="text-white/60">#ORD-${o.id}</span>
                                        <span class="text-white/30">${o.address.flat}</span>
                                    </div>
                                `).join('')}
                                ${data.count > 3 ? `<p class="text-[9px] font-black text-orange-500/50 uppercase tracking-widest">+ ${data.count - 3} more orders</p>` : ''}
                            </div>
                            <button onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(area)}', '_blank')" class="w-full py-4 border border-white/10 rounded-xl text-[9px] font-black uppercase hover:bg-white hover:text-black transition-all">View Cluster Map</button>
                        </div>
                    `).join('') || '<div class="col-span-full py-20 text-center opacity-10 h1 text-4xl italic uppercase">Quiet Streets... No Active Demand</div>'}
                </div>
            `;
        }

        function renderGaps(el) {
            const gaps = {};
            SEARCH_LOGS.filter(l => !l.found).forEach(l => {
                const q = l.query.toLowerCase();
                gaps[q] = (gaps[q] || 0) + 1;
            });

            const sortedGaps = Object.entries(gaps).sort((a,b) => b[1]-a[1]).slice(0, 12);

            el.innerHTML = `
                <div class="card p-12 bg-orange-500/5 border-orange-500/20 mb-12">
                    <h3 class="h1 italic text-4xl mb-6">Market Gap Analysis</h3>
                    <p class="text-white/40 text-sm max-w-2xl leading-relaxed">The following items were searched by your customers but are not in your 80-item catalog. Adding these will capture "Lost Revenue."</p>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    ${sortedGaps.map(([query, count]) => `
                        <div class="card p-8 group relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-6 opacity-5 group-hover:opacity-20 transition-opacity">
                                <span class="material-symbols-outlined text-6xl">search_off</span>
                            </div>
                            <p class="text-[9px] font-black text-orange-500 uppercase tracking-widest mb-2">${count > 10 ? 'High' : 'Medium'} Priority</p>
                            <h4 class="h1 italic !text-2xl mb-6">"${query}"</h4>
                            <div class="flex justify-between items-center">
                                <span class="text-white/30 text-[10px] font-bold uppercase">${count} Searches Logged</span>
                                <button onclick="setView('inventory'); openModal('add'); document.getElementById('m-name').value='${query}';" class="w-10 h-10 bg-white/5 group-hover:bg-white group-hover:text-black rounded-full flex items-center justify-center transition-all">
                                    <span class="material-symbols-outlined text-xs">add</span>
                                </button>
                            </div>
                        </div>
                    `).join('') || '<div class="col-span-full py-40 text-center opacity-10 h1 text-5xl italic uppercase">No Gaps Found Yet</div>'}
                </div>
            `;
        }

        function renderOrders(el) {
            const statusColors = { 
                'Pending': 'bg-orange-500/10 text-orange-500', 
                'Packing': 'bg-blue-500/10 text-blue-500', 
                'Shipped': 'bg-purple-500/10 text-purple-500', 
                'Delivered': 'bg-green-500/10 text-green-500',
                'Cancelled': 'bg-red-500/10 text-red-500'
            };

            el.innerHTML = `
                <div class="space-y-8">
                    ${ORDERS.map(o => `
                        <div class="card p-10">
                            <div class="flex justify-between items-start mb-10 pb-10 border-b border-white/5">
                                <div class="flex gap-8 items-center">
                                    <div class="w-16 h-16 bg-white/5 text-white rounded-2xl flex items-center justify-center h3 italic">#</div>
                                    <div>
                                        <h4 class="h1 italic !text-2xl mb-1">ORD-${o.id}</h4>
                                        <p class="text-[9px] font-black text-white/30 uppercase tracking-[0.2em]">${new Date(o.created_at).toLocaleString()}</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <select onchange="updateOrderStatus(${o.id}, this.value)" class="bg-white/5 text-[10px] font-black uppercase px-6 py-4 rounded-xl border border-white/10 outline-none focus:border-white">
                                        ${['Pending', 'Packing', 'Shipped', 'Delivered', 'Cancelled'].map(s => `<option value="${s}" ${o.status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                    </select>
                                    <span class="px-5 py-2.5 rounded-full ${statusColors[o.status] || 'bg-white/5 text-white'} text-[9px] font-black uppercase">${o.status}</span>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                                <div class="space-y-6">
                                    <h5 class="text-[9px] font-black uppercase text-white/20 tracking-widest">Customer Details</h5>
                                    <div class="flex items-center gap-4">
                                        <div class="flex-1">
                                            <p class="h1 italic !text-xl mb-1">${o.customer_name}</p>
                                            <p class="text-sm font-bold text-white/60 mb-4">${o.customer_phone}</p>
                                            <div class="flex gap-2">
                                                <button onclick="window.open('https://wa.me/${o.customer_phone}', '_blank')" class="flex-1 flex items-center justify-center gap-2 bg-green-500 text-black px-6 py-3 rounded-xl text-[10px] font-black uppercase">
                                                    <span class="material-symbols-outlined text-sm">chat</span> WhatsApp
                                                </button>
                                                <button onclick="copyTrackingLink(${o.id})" class="flex-1 flex items-center justify-center gap-2 bg-white/5 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase hover:bg-white hover:text-black">
                                                    <span class="material-symbols-outlined text-sm">link</span> Tracking Link
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="space-y-6 lg:border-x lg:border-white/5 lg:px-12">
                                    <h5 class="text-[9px] font-black uppercase text-white/20 tracking-widest">Delivery Address</h5>
                                    <p class="text-sm font-bold leading-relaxed">${o.address.flat}, Floor ${o.address.floor}<br/>${o.address.street}</p>
                                    <button onclick="window.open('https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.address.street)}', '_blank')" class="text-[9px] font-black uppercase text-orange-500 flex items-center gap-2">
                                        <span class="material-symbols-outlined text-sm">directions</span> Open in Maps
                                    </button>
                                </div>

                                <div class="space-y-6">
                                    <h5 class="text-[9px] font-black uppercase text-white/20 tracking-widest">Order Summary</h5>
                                    <div class="space-y-3">
                                        ${o.items.map(i => `
                                            <div class="flex justify-between text-xs">
                                                <span class="font-bold text-white/70">${i.qty}x ${i.name}</span>
                                                <span class="font-black">₹${i.price * i.qty}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                    <div class="pt-4 border-t border-white/5 flex justify-between items-center">
                                        <span class="h1 italic !text-2xl">Total</span>
                                        <span class="h1 italic !text-2xl text-orange-500">₹${o.total_amount}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('') || '<p class="py-40 text-center opacity-10 h1 text-7xl">NO ORDERS</p>'}
                </div>
            `;
        }


        async function updateOrderStatus(id, newStatus) {
            const { error } = await _supabase.from('orders').update({ status: newStatus }).eq('id', id);
            if (error) showToast("Status Update Failed 🔴");
            else { showToast(`Order #${id} marked as ${newStatus} 🚀`); fetchData(); }
        }

        function openModal(mode, id = null) {
            editingId = id;
            const title = document.getElementById('modalTitle');
            const btn = document.getElementById('modalActionBtn');
            
            if (mode === 'add') {
                title.innerText = "Add New Product";
                btn.innerText = "Create Product";
                clearFields();
            } else {
                const p = DATA.find(x => x.id === id);
                title.innerText = "Edit Product";
                btn.innerText = "Save Changes";
                fillFields(p);
            }
            document.getElementById('globalModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('globalModal').classList.add('hidden'); }

        function clearFields() {
            document.getElementById('m-name').value = "";
            document.getElementById('m-price').value = "";
            document.getElementById('m-discount').value = "";
            document.getElementById('m-stock').value = "";
            document.getElementById('m-weight').value = "";
            document.getElementById('m-img').value = "";
            document.getElementById('m-desc').value = "";
            document.getElementById('m-zepto').value = "";
            document.getElementById('m-blinkit').value = "";
        }

        function fillFields(p) {
            document.getElementById('m-name').value = p.name;
            document.getElementById('m-price').value = p.price;
            document.getElementById('m-discount').value = p.discount_price;
            document.getElementById('m-stock').value = p.stock;
            document.getElementById('m-weight').value = p.weight;
            document.getElementById('m-category').value = p.category;
            document.getElementById('m-img').value = p.image_url;
            document.getElementById('m-desc').value = p.description;
            document.getElementById('m-zepto').value = p.zepto_price || "";
            document.getElementById('m-blinkit').value = p.blinkit_price || "";
        }

        function copyTrackingLink(orderId) {
            const url = window.location.origin + '/track.html?id=' + orderId;
            navigator.clipboard.writeText(url).then(() => showToast("Tracking Link Copied! 🔗"));
        }

        function openComparison(name) {
            const q = encodeURIComponent(name);
            // OPEN GOOGLE SHOPPING (BEST FOR ZEPTO/BLINKIT PRICE CHECK)
            window.open(`https://www.google.com/search?tbm=shop&q=${q}`, '_blank');
            // OPEN BIGBASKET FOR WAREHOUSE BENCHMARKING
            window.open(`https://www.bigbasket.com/ps/?q=${q}`, '_blank');
        }

        async function submitProduct() {
            const form = document.getElementById('productForm');
            if (!form.reportValidity()) return;

            const price = parseInt(document.getElementById('m-price').value);
            const discount = parseInt(document.getElementById('m-discount').value);

            if (discount > price) {
                showToast("Error: Discount > Price 🔴");
                return;
            }

            const pData = {
                name: document.getElementById('m-name').value,
                price: price,
                discount_price: discount,
                stock: parseInt(document.getElementById('m-stock').value),
                weight: parseInt(document.getElementById('m-weight').value),
                category: document.getElementById('m-category').value,
                image_url: document.getElementById('m-img').value,
                description: document.getElementById('m-desc').value,
                zepto_price: parseInt(document.getElementById('m-zepto').value) || null,
                blinkit_price: parseInt(document.getElementById('m-blinkit').value) || null
            };

            if (editingId) {
                const { error } = await _supabase.from('products').update(pData).eq('id', editingId);
                if (error) showToast("Update Failed 🔴");
                else { showToast("Product Updated 🚀"); closeModal(); fetchData(); }
            } else {
                const { error } = await _supabase.from('products').insert([pData]);
                if (error) showToast("Create Failed 🔴");
                else { showToast("Product Created 🚀"); closeModal(); fetchData(); }
            }
        }

        async function deleteProduct(id) {
            if (!confirm("Are you sure? This will remove the product permanently.")) return;
            const { error } = await _supabase.from('products').delete().eq('id', id);
            if (error) showToast("Delete Failed 🔴");
            else { showToast("Product Removed 🗑️"); fetchData(); }
        }

        fetchData();
    </script>
</body>
</html>
